<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie Senza Ostacoli</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

<style>
:root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --font-body: 'Barlow', sans-serif; --blue: #2d7de8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }
#map-wrap { flex: 1; min-height: 45vh; position: relative; display: flex; flex-direction: column; }
#map { flex: 1; width: 100%; z-index: 1; }
#filter-container { background: var(--surface); padding: 10px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; z-index: 999; }
.dropbtn, .nav-btn { background: rgba(255,255,255,0.05); color: white; padding: 8px 15px; font-size: 11px; font-weight: 800; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; }
.nav-btn { background: var(--blue); border: none; }
#sidebar { background: var(--surface); flex: 1; overflow-y: auto; padding: 15px; border-top: 2px solid var(--border); z-index: 2; }
@media (min-width: 768px) { #sidebar { width: 400px; flex: none; border-left: 1px solid var(--border); } }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
.cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; }
.cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }
textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-family: inherit; resize: none; }
.btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
.report-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }

/* PIN GOCCIA CON ICONA - FIX STRUTTURALE */
.custom-pin { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -32px 0 0 -16px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
.pin-icon { transform: rotate(45deg); font-size: 16px; pointer-events: none; }
</style>
</head>
<body>

<div id="topbar">
  <div style="font-weight: 800; font-size: 18px;">MAGLIE<span style="color:var(--accent)"> SENZA OSTACOLI</span></div>
  <div style="text-align: right;">
    <div style="font-size: 10px; color: #5a6070">UN'APP DI ANGELO GRECO</div>
    <div style="font-size: 9px; color: var(--accent); font-weight: 700;">ASSOCIAZIONE C.F.P.</div>
  </div>
</div>

<div id="main">
  <div id="map-wrap">
    <div id="filter-container">
        <button class="nav-btn" onclick="toggleLocation()">📍 VAI A MORIGINO / MAGLIE</button>
    </div>
    <div id="map"></div>
  </div>

  <div id="sidebar">
    <div class="cat-grid">
      <div class="cat-btn active" onclick="setCat(this, 'Architettonica')">♿ Barriera</div>
      <div class="cat-btn" onclick="setCat(this, 'Occupazione')">🚗 Occupazione</div>
      <div class="cat-btn" onclick="setCat(this, 'Manutenzione')">⚠️ Manutenzione</div>
      <div class="cat-btn" onclick="setCat(this, 'Accessibile')">✅ Luogo OK</div>
    </div>
    <textarea id="desc" rows="3" placeholder="Scrivi qui i dettagli..."></textarea>
    <button class="btn-primary" id="btnInvia">INVIA SEGNALAZIONE</button>
    <div id="lista" style="margin-top:20px;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const cfg = {
    apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
    authDomain: "maglie-senza-ostacoli.firebaseapp.com",
    projectId: "maglie-senza-ostacoli",
    storageBucket: "maglie-senza-ostacoli.firebasestorage.app",
    messagingSenderId: "727829599519",
    appId: "1:727829599519:web:53b1f3d84d8a4425f98c2a",
    databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);

  let selectedCat = 'Architettonica';
  let isAtMorigino = false;
  let marker;
  let markersLayer = L.layerGroup();

  const map = L.map('map', { zoomControl: true }).setView([40.1194, 18.2997], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  markersLayer.addTo(map);

  window.toggleLocation = () => {
    if (!isAtMorigino) { map.flyTo([40.1417, 18.3098], 17); isAtMorigino = true; }
    else { map.flyTo([40.1194, 18.2997], 15); isAtMorigino = false; }
  };

  // CLICCA SULLA MAPPA PER METTERE IL PUNTO
  map.on('click', e => {
    if(marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
    console.log("Punto fissato:", e.latlng);
  });

  window.setCat = (el, cat) => {
    document.querySelectorAll('.cat-grid div').forEach(b => b.classList.remove('active'));
    el.classList.add('active'); selectedCat = cat;
  };

  // CARICAMENTO DATI VECCHI
  onValue(ref(db, 'segnalazioni'), snap => {
    const data = snap.val() || {};
    const lista = document.getElementById('lista');
    lista.innerHTML = "";
    markersLayer.clearLayers();
    
    Object.keys(data).reverse().forEach(id => {
      const s = data[id];
      let iconChar = '♿';
      if(s.cat === 'Occupazione') iconChar = '🚗';
      if(s.cat === 'Manutenzione') iconChar = '⚠️';
      if(s.cat === 'Accessibile') iconChar = '✅';

      const color = s.cat === 'Accessibile' ? '#2d7de8' : '#e03535';
      
      const customIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="custom-pin" style="background:${color};"><span class="pin-icon">${iconChar}</span></div>`,
        iconSize: [32, 42], iconAnchor: [16, 42]
      });

      L.marker([s.lat, s.lng], {icon: customIcon}).addTo(markersLayer).bindPopup(s.desc);
      
      const item = document.createElement('div');
      item.className = 'report-item';
      item.style.borderLeftColor = color;
      item.innerHTML = `<strong>${iconChar} ${s.cat}</strong><p style="font-size:11px;">${s.desc}</p>`;
      lista.appendChild(item);
    });
  });

  // INVIO SEGNALAZIONE
  document.getElementById('btnInvia').onclick = async () => {
    const d = document.getElementById('desc').value.trim();
    if(!marker || !d) return alert("Punta la mappa e scrivi!");
    
    try {
      await push(ref(db, 'segnalazioni'), {
        cat: selectedCat, desc: d, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng, ts: Date.now()
      });
      location.reload();
    } catch (e) { alert("Errore invio!"); }
  };
</script>
</body>
</html>
