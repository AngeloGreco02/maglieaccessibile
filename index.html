<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie Senza Ostacoli</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --font-body: 'Barlow', sans-serif; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
.logo { font-weight: 800; font-size: 18px; cursor: pointer; } .logo span { color: var(--accent); }
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }
#map-wrap { flex: 1; min-height: 40vh; position: relative; }
#map { height: 100%; width: 100%; }
#sidebar { background: var(--surface); flex: 1; overflow-y: auto; padding: 15px; border-top: 2px solid var(--border); }
@media (min-width: 768px) { #sidebar { width: 400px; flex: none; border-left: 1px solid var(--border); } }
.section-title { font-size: 14px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; font-weight: 800; display: flex; justify-content: space-between; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
.cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; }
.cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }
textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; min-height: 80px; }
.btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
.admin-btn { font-size: 10px; color: var(--muted); background: none; border: 1px solid var(--border); padding: 2px 5px; border-radius: 4px; cursor: pointer; }
.report-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); font-size: 13px; }
.delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; margin-top: 5px; cursor: pointer; display: none; }
</style>
</head>
<body>
<div id="topbar">
  <div class="logo" onclick="location.reload()">MAGLIE<br><span>SENZA OSTACOLI</span></div>
  <div style="text-align: right;">
    <div style="font-size: 11px; color: #5a6070">UN'APP DI ANGELO GRECO</div>
    <button class="admin-btn" id="loginAdmin">🔐 GESTISCI</button>
  </div>
</div>
<div id="main">
  <div id="map-wrap"><div id="map"></div></div>
  <div id="sidebar">
    <div id="form-segnalazione">
        <div class="section-title">Tipo di problema</div>
        <div class="cat-grid">
          <div class="cat-btn active" onclick="setCat(this, 'Architettonica')">♿ Architettonica</div>
          <div class="cat-btn" onclick="setCat(this, 'Occupazione')">🚗 Occupazione</div>
          <div class="cat-btn" onclick="setCat(this, 'Manutenzione')">⚠️ Manutenzione</div>
          <div class="cat-btn" onclick="setCat(this, 'Sensoriale')">🚦 Sensoriale</div>
        </div>
        <textarea id="desc" placeholder="Descrivi il problema..."></textarea>
        <input type="file" id="foto" accept="image/*" style="margin-bottom: 15px; color: #5a6070; font-size: 12px; display: block;">
        <button class="btn-primary" id="btnInvia">INVIA SEGNALAZIONE</button>
    </div>

    <div class="section-title">Segnalazioni Recenti</div>
    <div id="lista-segnalazioni"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const cfg = {
    apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
    authDomain: "maglie-senza-ostacoli.firebaseapp.com",
    projectId: "maglie-senza-ostacoli",
    storageBucket: "maglie-senza-ostacoli.firebasestorage.app",
    messagingSenderId: "727829599519",
    appId: "1:727829599519:web:53b1f3d84d8a4425f98c2a",
    databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let selectedCat = 'Architettonica';
  let marker;
  let isAdmin = false;
  const PWD_ADMIN = "maglie2025admin"; // CAMBIA QUESTA PASSWORD

  const map = L.map('map', {zoomControl: false}).setView([40.1209, 18.2323], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.locate({setView: true, maxZoom: 16});
  map.on('locationfound', e => { marker = L.marker(e.latlng).addTo(map); });
  map.on('click', e => { if(marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); });

  // Gestione Login Admin
  document.getElementById('loginAdmin').onclick = () => {
    const p = prompt("Inserisci la password amministratore:");
    if(p === PWD_ADMIN) {
      isAdmin = true;
      alert("Modalità amministratore attivata.");
      document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
    } else {
      alert("Password errata.");
    }
  };

  // Caricamento e visualizzazione segnalazioni
  onValue(ref(db, 'segnalazioni'), snap => {
    const lista = document.getElementById('lista-segnalazioni');
    lista.innerHTML = "";
    const data = snap.val();
    
    // Rimuove vecchi marker
    map.eachLayer(l => { if(l instanceof L.Marker && l !== marker) map.removeLayer(l); });

    if(data) {
      Object.keys(data).forEach(id => {
        const s = data[id];
        let popupCont = `<b>${s.cat}</b><br>${s.desc}`;
        if(s.fotoUrl) popupCont += `<br><img src="${s.fotoUrl}" style="width:100px; border-radius:5px">`;
        
        L.marker([s.lat, s.lng]).addTo(map).bindPopup(popupCont);

        // Crea elemento lista
        const div = document.createElement('div');
        div.className = "report-item";
        div.innerHTML = `
          <strong>${s.cat}</strong><br>${s.desc}
          <button class="delete-btn" onclick="elimina('${id}', '${s.fotoPath || ""}')" style="${isAdmin ? 'display:block' : ''}">🗑 ELIMINA</button>
        `;
        lista.appendChild(div);
      });
    }
  });

  window.setCat = (el, cat) => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedCat = cat;
  };

  window.elimina = async (id, path) => {
    if(!confirm("Vuoi davvero eliminare questa segnalazione?")) return;
    try {
        await remove(ref(db, 'segnalazioni/' + id));
        if(path) {
            const fileRef = sRef(storage, path);
            await deleteObject(fileRef);
        }
        alert("Eliminata.");
    } catch (e) { alert("Errore nell'eliminazione."); }
  };

  document.getElementById('btnInvia').onclick = async () => {
    const d = document.getElementById('desc').value;
    const file = document.getElementById('foto').files[0];
    if(!marker || !d) return alert("Inserisci descrizione e posizione!");
    
    const btn = document.getElementById('btnInvia');
    btn.innerText = "CARICAMENTO...";
    btn.disabled = true;
    let fotoUrl = "";
    let fotoPath = "";

    try {
      if(file) {
        fotoPath = 'foto/' + Date.now() + "_" + file.name;
        const storageRef = sRef(storage, fotoPath);
        await uploadBytes(storageRef, file);
        fotoUrl = await getDownloadURL(storageRef);
      }

      await push(ref(db, 'segnalazioni'), {
        cat: selectedCat, desc: d, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng, fotoUrl, fotoPath, ts: Date.now()
      });
      alert("Inviato!");
      location.reload();
    } catch (e) { alert("Errore."); btn.innerText = "INVIA SEGNALAZIONE"; btn.disabled = false; }
  };
</script>
</body>
</html>
