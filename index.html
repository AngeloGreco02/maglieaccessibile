<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie Senza Ostacoli</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --font-body: 'Barlow', sans-serif; --blue: #2d7de8; --yellow: #f1c40f; --green: #2ecc71; --purple: #a55eea; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
.logo { font-weight: 800; font-size: 18px; cursor: pointer; } .logo span { color: var(--accent); }
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }
#map-wrap { flex: 1; min-height: 45vh; position: relative; display: flex; flex-direction: column; }
#map { flex: 1; width: 100%; }

#filter-bar { background: var(--surface); padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); white-space: nowrap; -webkit-overflow-scrolling: touch; }
.filter-chip { padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); }
.filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.morigino-btn { background: var(--blue); color: white; border: none; }

#sidebar { background: var(--surface); flex: 1; overflow-y: auto; padding: 15px; border-top: 2px solid var(--border); }
@media (min-width: 768px) { #sidebar { width: 400px; flex: none; border-left: 1px solid var(--border); } }
.section-title { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
.cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; }
.cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }
.cat-btn.plus.active { border-color: var(--blue); background: rgba(45,125,232,0.2); }
textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-family: inherit; resize: none; }
.btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
.privacy-note { font-size: 10px; color: #5a6070; margin-top: 8px; text-align: center; margin-bottom: 20px; }
.report-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
.status-select { background: #222; color: white; border: 1px solid var(--border); padding: 6px; border-radius: 4px; font-size: 11px; margin-top: 8px; width: 100%; display: none; }
.badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
.export-btn { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; display: none; }
#preview { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>
<div id="topbar">
  <div class="logo" onclick="location.reload()">MAGLIE<span> SENZA OSTACOLI</span></div>
  <div style="text-align: right;">
    <div style="font-size: 10px; color: #5a6070">UN'APP DI ANGELO GRECO</div>
    <div style="font-size: 9px; color: var(--accent); font-weight: 700;">ASSOCIAZIONE C.F.P.</div>
    <button onclick="abilitaGestione()" style="font-size: 10px; background:none; border:none; color:#5a6070; cursor:pointer;">🔐 ADMIN</button>
  </div>
</div>
<div id="main">
  <div id="map-wrap">
    <div id="filter-bar">
        <div class="filter-chip active" onclick="filterMap('TUTTE', this)">TUTTE</div>
        <div class="filter-chip" onclick="filterMap('Architettonica', this)">♿ BARRIERE</div>
        <div class="filter-chip" onclick="filterMap('Occupazione', this)">🚗 OCCUPAZIONE</div>
        <div class="filter-chip" onclick="filterMap('Accessibile', this)">✅ LUOGHI OK</div>
        <div class="filter-chip morigino-btn" onclick="vaiAMorigino()">📍 VAI A MORIGINO</div>
    </div>
    <div id="map"></div>
  </div>
  <div id="sidebar">
    <div class="section-title">Nuova Segnalazione</div>
    <div class="cat-grid">
      <div class="cat-btn active" onclick="setCat(this, 'Architettonica')">♿ Barriera</div>
      <div class="cat-btn" onclick="setCat(this, 'Occupazione')">🚗 Occupazione</div>
      <div class="cat-btn" onclick="setCat(this, 'Manutenzione')">⚠️ Manutenzione</div>
      <div class="cat-btn plus" onclick="setCat(this, 'Accessibile')">✅ Luogo OK</div>
    </div>
    <textarea id="desc" rows="3" placeholder="Descrivi il punto esatto..."></textarea>
    
    <img id="preview">
    <input type="file" id="foto" accept="image/*" style="margin-bottom:15px; font-size:12px; width:100%; color: #5a6070;">
    
    <button class="btn-primary" id="btnInvia">INVIA SEGNALAZIONE</button>
    <div class="privacy-note">⚠️ Non inquadrare volti di persone o targhe di veicoli. Le auto scadono dopo 24h.</div>

    <div class="section-title" style="margin-top:20px;">
      Segnalazioni Recenti
      <button class="export-btn" id="exportBtn" onclick="esportaDati()">📊 REPORT CSV</button>
    </div>
    <div id="lista"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const cfg = {
    apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
    authDomain: "maglie-senza-ostacoli.firebaseapp.com",
    projectId: "maglie-senza-ostacoli",
    storageBucket: "maglie-senza-ostacoli.firebasestorage.app",
    messagingSenderId: "727829599519",
    appId: "1:727829599519:web:53b1f3d84d8a4425f98c2a",
    databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let selectedCat = 'Architettonica';
  let currentFilter = 'TUTTE';
  let marker;
  let isAdmin = false;
  let rawData = {};
  let markersLayer = L.layerGroup();

  // CONFINI ALLARGATI PER INCLUDERE MORIGINO (PIÙ A SUD)
  const bounds = [[40.0850, 18.2700], [40.1450, 18.3300]];
  const map = L.map('map', { zoomControl: false, maxBounds: bounds, maxBoundsViscosity: 1.0, minZoom: 14 }).setView([40.1194, 18.2997], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  markersLayer.addTo(map);

  // COORDINATE CENTRALI MORIGINO (INCROCIO VIA ABATE / VIA MARCONI)
  window.vaiAMorigino = () => { map.flyTo([40.1009, 18.3115], 17); };

  map.on('click', e => { if(marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); });

  window.setCat = (el, cat) => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedCat = cat;
  };

  window.filterMap = (category, el) => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentFilter = category;
    renderData();
  };

  window.abilitaGestione = () => {
    if(prompt("Password Admin:") === "maglie2025") {
      isAdmin = true;
      document.querySelectorAll('.status-select, .export-btn').forEach(s => s.style.display = 'block');
      alert("Gestione C.F.P. Attiva");
    }
  };

  onValue(ref(db, 'segnalazioni'), snap => {
    rawData = snap.val() || {};
    renderData();
  });

  function renderData() {
    const lista = document.getElementById('lista');
    lista.innerHTML = "";
    markersLayer.clearLayers();
    Object.keys(rawData).reverse().forEach(id => {
      const s = rawData[id];
      if (currentFilter !== 'TUTTE' && s.cat !== currentFilter) return;
      const status = s.status || 'non-risolta';
      let color = s.cat === 'Accessibile' ? '#2d7de8' : (status === 'risolta' ? '#2ecc71' : '#e03535');
      const icon = L.divIcon({ className: 'custom-icon', html: `<div style="background:${color}; width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>`, iconSize: [12, 12] });
      
      let popupCont = `<b>${s.cat}</b><br>${s.desc}`;
      if(s.fotoUrl) popupCont += `<br><img src="${s.fotoUrl}" style="width:120px; border-radius:5px; margin-top:5px">`;
      L.marker([s.lat, s.lng], {icon}).addTo(markersLayer).bindPopup(popupCont);

      const item = document.createElement('div');
      item.className = 'report-item';
      item.style.borderLeftColor = color;
      item.innerHTML = `
        <div style="display:flex; justify-content:space-between; font-size:12px;"><strong>${s.cat}</strong><span class="badge" style="background:${color}; color:#fff">${status.toUpperCase()}</span></div>
        <p style="font-size:11px; margin-top:4px; color:#ccc;">${s.desc}</p>
        ${s.fotoUrl ? `<img src="${s.fotoUrl}" style="width:100%; height:100px; object-fit:cover; border-radius:5px; margin-top:8px;">` : ''}
        ${s.verificato ? '<div style="color:#2ecc71; font-size:9px; font-weight:900; margin-top:5px;">✓ VERIFICATO</div>' : ''}
        <select class="status-select" onchange="aggiornaStato('${id}', this.value, '${s.fotoPath || ''}')" style="${isAdmin ? 'display:block' : 'none'}">
          <option value="non-risolta">🔴 Segnalata</option>
          <option value="risolta">🟢 Risolta</option>
          <option value="verificato">✅ Segna VERIFICATO</option>
          <option value="elimina">🗑 Elimina</option>
        </select>
      `;
      lista.appendChild(item);
    });
  }

  window.aggiornaStato = async (id, val, fPath) => {
    if(val === 'elimina') { 
      if(confirm("Eliminare?")) {
        await remove(ref(db, 'segnalazioni/' + id));
        if(fPath) try { await deleteObject(sRef(storage, fPath)); } catch(e) {}
      }
    } else if(val === 'verificato') {
       await update(ref(db, 'segnalazioni/' + id), { verificato: true });
    } else await update(ref(db, 'segnalazioni/' + id), { status: val });
  };

  document.getElementById('foto').onchange = e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = () => { const img = document.getElementById('preview'); img.src = reader.result; img.style.display = 'block'; };
      reader.readAsDataURL(file);
    }
  };

  document.getElementById('btnInvia').onclick = async () => {
    const d = document.getElementById('desc').value.trim();
    const file = document.getElementById('foto').files[0];
    if(!marker || !d) return alert("Scegli un punto sulla mappa e scrivi una descrizione!");
    const latlng = marker.getLatLng();
    if (!L.latLngBounds(bounds).contains(latlng)) return alert("⚠️ Sei fuori dai confini di Maglie/Morigino!");
    const b = document.getElementById('btnInvia');
    b.innerText = "INVIO..."; b.disabled = true;
    
    try {
      let fUrl = "", fPath = "";
      if(file) {
        fPath = 'foto/' + Date.now() + ".jpg";
        await uploadBytes(sRef(storage, fPath), file);
        fUrl = await getDownloadURL(sRef(storage, fPath));
      }
      await push(ref(db, 'segnalazioni'), { cat: selectedCat, desc: d, lat: latlng.lat, lng: latlng.lng, fotoUrl: fUrl, fotoPath: fPath, status: 'non-risolta', ts: Date.now(), verificato: false });
      location.reload();
    } catch (e) { alert("Errore invio."); b.innerText = "INVIA SEGNALAZIONE"; b.disabled = false; }
  }

  window.esportaDati = () => {
    let csv = "Categoria,Descrizione,Stato,Data\n";
    Object.values(rawData).forEach(s => { csv += `"${s.cat}","${s.desc}","${s.status}","${new Date(s.ts).toLocaleDateString()}"\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'report_maglie.csv'; a.click();
  };
</script>
</body>
</html>
