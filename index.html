<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie Senza Ostacoli</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --font-body: 'Barlow', sans-serif; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
.logo { font-weight: 800; font-size: 18px; } .logo span { color: var(--accent); }
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }
#map-wrap { flex: 1; min-height: 40vh; position: relative; }
#map { height: 100%; width: 100%; }
#sidebar { background: var(--surface); flex: 1; overflow-y: auto; padding: 15px; border-top: 2px solid var(--border); }
@media (min-width: 768px) { #sidebar { width: 400px; flex: none; border-left: 1px solid var(--border); } }
textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
.btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
#preview { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>
<div id="topbar"><div class="logo">MAGLIE<br><span>SENZA OSTACOLI</span></div><div style="font-size: 11px; color: #5a6070">UN'APP DI ANGELO GRECO</div></div>
<div id="main">
  <div id="map-wrap"><div id="map"></div></div>
  <div id="sidebar">
    <h2 style="color: var(--accent); margin-bottom: 15px;">Segnala Barriera</h2>
    <textarea id="desc" placeholder="Descrivi il problema..."></textarea>
    <img id="preview">
    <input type="file" id="foto" accept="image/*" style="margin-bottom: 15px; color: #5a6070">
    <button class="btn-primary" id="btnInvia">CARICA E INVIA</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const cfg = {
    apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
    authDomain: "maglie-senza-ostacoli.firebaseapp.com",
    projectId: "maglie-senza-ostacoli",
    storageBucket: "maglie-senza-ostacoli.firebasestorage.app",
    messagingSenderId: "727829599519",
    appId: "1:727829599519:web:53b1f3d84d8a4425f98c2a",
    databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let marker;
  const map = L.map('map', {zoomControl: false}).setView([40.1209, 18.2323], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.locate({setView: true, maxZoom: 16});

  map.on('locationfound', e => { marker = L.marker(e.latlng).addTo(map); });
  map.on('click', e => { if(marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); });

  onValue(ref(db, 'segnalazioni'), snap => {
    const data = snap.val();
    if(data) Object.values(data).forEach(s => {
      let popup = s.desc;
      if(s.fotoUrl) popup += `<br><img src="${s.fotoUrl}" style="width:100px; margin-top:5px; border-radius:5px">`;
      L.marker([s.lat, s.lng]).addTo(map).bindPopup(popup);
    });
  });

  document.getElementById('foto').onchange = e => {
    const reader = new FileReader();
    reader.onload = () => { const img = document.getElementById('preview'); img.src = reader.result; img.display = 'block'; };
    reader.readAsDataURL(e.target.files[0]);
  };

  document.getElementById('btnInvia').onclick = async () => {
    const d = document.getElementById('desc').value;
    const file = document.getElementById('foto').files[0];
    if(!marker || !d) return alert("Inserisci descrizione e posizione!");
    
    document.getElementById('btnInvia').innerText = "CARICAMENTO...";
    let fotoUrl = "";

    if(file) {
      const storageRef = sRef(storage, 'foto/' + Date.now() + "_" + file.name);
      await uploadBytes(storageRef, file);
      fotoUrl = await getDownloadURL(storageRef);
    }

    await push(ref(db, 'segnalazioni'), {
      desc: d, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng, fotoUrl: fotoUrl, ts: Date.now()
    });
    
    alert("Segnalazione inviata con successo!");
    location.reload();
  };
</script>
</body>
</html>
