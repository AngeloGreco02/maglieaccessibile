<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie Senza Ostacoli</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --border: rgba(255,255,255,.07);
  --text: #e8eaf0;
  --muted: #5a6070;
  --accent: #e03535;
  --blue: #2d7de8;
  --green: #1db87a;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

/* Reset base */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: var(--font-body); 
  height: 100vh; 
  display: flex; 
  flex-direction: column;
  overflow: hidden; 
}

/* Topbar compatta */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}
.logo { font-family: var(--font-display); font-weight: 800; line-height: 1; font-size: 18px; }
.logo span { color: var(--accent); }

/* Layout flessibile */
#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }

/* Mappa */
#map-wrap { flex: 1; min-height: 40vh; position: relative; z-index: 1; }
#map { height: 100%; width: 100%; }

/* Sidebar/Form Mobile */
#sidebar {
  background: var(--surface);
  flex: 1.2;
  overflow-y: auto;
  border-top: 2px solid var(--border);
  padding: 15px;
  -webkit-overflow-scrolling: touch;
}
@media (min-width: 768px) {
  #sidebar { width: 400px; flex: none; border-top: none; border-left: 1px solid var(--border); }
}

/* UI Elements */
.section-title { font-family: var(--font-display); font-size: 18px; text-transform: uppercase; margin-bottom: 15px; color: var(--accent); }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.cat-btn { 
  background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;
  padding: 12px; border-radius: 8px; font-size: 12px; text-align: center; cursor: pointer;
}
.cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }

textarea {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: white; padding: 12px; border-radius: 8px; resize: none; margin-bottom: 15px; font-family: inherit;
}

.btn-primary {
  width: 100%; background: var(--accent); color: white; border: none;
  padding: 15px; border-radius: 10px; font-weight: 800; font-family: var(--font-display);
  font-size: 18px; letter-spacing: 1px; cursor: pointer;
}

.nav-mobile {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px; justify-content: space-around;
}
.nav-btn { background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600; }
.nav-btn.active { color: var(--accent); }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">MAGLIE<br><span>SENZA OSTACOLI</span></div>
  <div id="status" style="font-size: 11px; font-weight: 700; color: var(--muted)"> UN APP DI ANGELO GRECO </div>
</div>

<div id="main">
  <div id="map-wrap">
    <div id="map"></div>
  </div>

  <div id="sidebar">
    <div class="section-title">Nuova Segnalazione</div>
    
    <div class="cat-grid">
      <div class="cat-btn active" onclick="setCat(this, 'arch')">♿ Architettonica</div>
      <div class="cat-btn" onclick="setCat(this, 'illegal')">🚗 Occupazione</div>
      <div class="cat-btn" onclick="setCat(this, 'maint')">⚠️ Manutenzione</div>
      <div class="cat-btn" onclick="setCat(this, 'sensory')">🚦 Sensoriale</div>
    </div>

    <textarea id="desc" placeholder="Descrivi il problema..."></textarea>
    
    <div style="margin-bottom: 20px;">
      <label style="font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px;">FOTO / VIDEO</label>
      <input type="file" id="media" accept="image/*,video/*" style="font-size: 12px;">
    </div>

    <button class="btn-primary" onclick="invia()">INVIA SEGNALAZIONE</button>
    <p style="text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px;">
      Tocca la mappa per segnare la posizione esatta.
    </p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const cfg = {
    apiKey: "AIzaSyCrxqfyDQPZABGt3eWDvhzyRyaJrsipJlA",
    authDomain: "fantasocio.firebaseapp.com",
    databaseURL: "https://fantasocio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "fantasocio",
    storageBucket: "fantasocio.appspot.com",
    messagingSenderId: "913473439775",
    appId: "1:913473439775:web:f60b4fae1ed694c997ed2a"
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);

  let selectedCat = 'arch';
  let marker;
  const map = L.map('map', {zoomControl: false}).setView([40.1186, 18.2985], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on('click', (e) => {
    if (marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
  });

  window.setCat = (el, cat) => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedCat = cat;
  };

  window.invia = async () => {
    const d = document.getElementById('desc').value;
    if (!marker || !d) return alert("Segna la posizione e scrivi una descrizione!");
    
    await push(ref(db, 'segnalazioni'), {
      cat: selectedCat,
      desc: d,
      lat: marker.getLatLng().lat,
      lng: marker.getLatLng().lng,
      ts: Date.now()
    });
    alert("Inviato!");
    location.reload();
  };
</script>
</body>
</html>
