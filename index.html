<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maglie senza barriere</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --blue: #2d7de8; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .logo { font-weight: 800; font-size: 16px; text-transform: uppercase; color: #fff; } .logo span { color: var(--accent); }
        
        #main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 768px) { #main { flex-direction: row; } }
        
        #map-wrap { flex: 1; position: relative; display: flex; flex-direction: column; min-height: 50vh; }
        #map { flex: 1; width: 100%; background: #000; } /* Sfondo nero se non carica */
        
        #controls { background: var(--surface); padding: 8px; display: flex; gap: 5px; z-index: 1000; border-bottom: 1px solid var(--border); }
        .btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--blue); border: none; }
        .btn-green { background: var(--green); border: none; }
        
        #sidebar { background: var(--surface); width: 100%; padding: 15px; overflow-y: auto; z-index: 1002; border-top: 1px solid var(--border); }
        @media (min-width: 768px) { #sidebar { width: 350px; border-left: 1px solid var(--border); border-top: none; } }
        
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; }
        .cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }
        
        textarea, input[type="text"] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
        .btn-send { width: 100%; background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        .info-box { font-size: 11px; color: #aaa; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid var(--border); }
        .report-item { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div id="topbar">
    <div class="logo">MAGLIE <span>SENZA BARRIERE</span></div>
    <div style="text-align:right">
        <div style="font-size: 8px; color: var(--accent);">ASSOCIAZIONE C.F.P.</div>
        <button onclick="abilitaAdmin()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer;">🔐 ADMIN</button>
    </div>
</div>

<div id="main">
    <div id="map-wrap">
        <div id="controls">
            <select id="fCat" class="btn" onchange="filtra(this.value)">
                <option value="TUTTE">🔍 TUTTE</option>
                <option value="Barriera">♿ BARRIERE</option>
                <option value="Auto">🚗 AUTO</option>
                <option value="Guasto">⚠️ GUASTO</option>
                <option value="OK">✅ LUOGO OK</option>
            </select>
            <button class="btn btn-blue" onclick="vaiMorigino()" id="btnMor">📍 MORIGINO</button>
            <button class="btn btn-green" onclick="trovaGPS()">🎯 GPS</button>
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar">
        <div class="cat-grid">
            <div class="cat-btn active" onclick="setCat(this, 'Barriera')">♿ Barriera</div>
            <div class="cat-btn" onclick="setCat(this, 'Auto')">🚗 Auto</div>
            <div class="cat-btn" onclick="setCat(this, 'Guasto')">⚠️ Guasto</div>
            <div class="cat-btn" onclick="setCat(this, 'OK')">✅ Luogo OK</div>
        </div>
        <textarea id="desc" placeholder="Descrivi il problema..."></textarea>
        
        <div style="font-size: 10px; color: var(--blue); font-weight: 700; margin-bottom: 5px;">📷 FOTO (Link Gratuito):</div>
        <input type="text" id="fotoUrl" placeholder="Incolla link foto (es. da ImgBB)">
        
        <button class="btn-send" id="btnInvia">INVIA SEGNALAZIONE</button>

        <div class="info-box">
            <b>ASSOCIAZIONE C.F.P.</b><br>
            Mappatura partecipata per Maglie e Morigino.<br>
            <i>⚠️ Non fotografare volti o targhe.</i>
        </div>
        
        <div id="lista" style="margin-top:20px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
        authDomain: "maglie-senza-ostacoli.firebaseapp.com",
        databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "maglie-senza-ostacoli"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // INIZIALIZZA MAPPA
    const map = L.map('map').setView([40.1194, 18.2997], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker;
    let selectedCat = "Barriera";
    let isAdmin = false;
    let markersLayer = L.layerGroup().addTo(map);

    // RICERCA VIA
    L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Cerca via..." })
    .on('markgeocode', function(e) {
        const center = e.geocode.center;
        map.setView(center, 18);
        if(marker) map.removeLayer(marker);
        marker = L.marker(center).addTo(map);
    }).addTo(map);

    map.on('click', e => {
        if(marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);
    });

    // FUNZIONI PULSANTI
    window.vaiMorigino = () => {
        const btn = document.getElementById('btnMor');
        if(btn.innerText.includes("MORIGINO")) {
            map.flyTo([40.1417, 18.3098], 17);
            btn.innerText = "📍 MAGLIE";
        } else {
            map.flyTo([40.1194, 18.2997], 15);
            btn.innerText = "📍 MORIGINO";
        }
    };

    window.trovaGPS = () => map.locate({setView: true, maxZoom: 17});
    map.on('locationfound', e => {
        if(marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);
    });

    window.setCat = (el, cat) => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedCat = cat;
    };

    window.abilitaAdmin = () => {
        if(prompt("Password Admin:") === "maglie2025") {
            isAdmin = true;
            alert("Modalità Admin Attiva");
            caricaDati();
        }
    };

    // GESTIONE DATI
    const caricaDati = () => {
        onValue(ref(db, 'segnalazioni'), snap => {
            const data = snap.val() || {};
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            markersLayer.clearLayers();
            
            Object.keys(data).reverse().forEach(id => {
                const s = data[id];
                const color = s.cat === 'OK' ? '#2ecc71' : '#e03535';
                
                // Marker su mappa
                L.circleMarker([s.lat, s.lng], { color: color, radius: 8, fillOpacity: 0.8 })
                .addTo(markersLayer).bindPopup(s.desc);

                // Elemento in lista
                const div = document.createElement('div');
                div.className = 'report-item';
                div.style.borderLeftColor = color;
                div.innerHTML = `<b>${s.cat}</b><br><small>${s.desc}</small>
                ${s.fotoUrl ? `<br><img src="${s.fotoUrl}" style="width:100%; margin-top:5px; border-radius:4px;">` : ''}
                ${isAdmin ? `<br><button onclick="eliminaSegn('${id}')" style="color:red; background:none; border:none; cursor:pointer; font-size:10px;">🗑 ELIMINA</button>` : ''}`;
                lista.appendChild(div);
            });
        });
    };
    
    window.eliminaSegn = id => { if(confirm("Eliminare?")) remove(ref(db, 'segnalazioni/'+id)); };

    caricaDati();

    document.getElementById('btnInvia').onclick = async () => {
        const d = document.getElementById('desc').value.trim();
        const f = document.getElementById('fotoUrl').value.trim();
        if(!marker || !d) return alert("Segna sulla mappa e scrivi!");
        
        const btn = document.getElementById('btnInvia');
        btn.disabled = true; btn.innerText = "INVIO...";
        
        try {
            await push(ref(db, 'segnalazioni'), {
                cat: selectedCat, desc: d, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng,
                fotoUrl: f, ts: Date.now()
            });
            location.reload();
        } catch(e) { alert("Errore!"); btn.disabled = false; }
    };
</script>

</body>
</html>
