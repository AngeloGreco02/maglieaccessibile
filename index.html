<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Maglie senza barriere</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

<style>
:root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --font-body: 'Barlow', sans-serif; --blue: #2d7de8; --green: #2ecc71; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
.logo { font-weight: 800; font-size: 18px; text-transform: uppercase; } .logo span { color: var(--accent); }

#main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
@media (min-width: 768px) { #main { flex-direction: row; } }

#map-wrap { flex: 1; min-height: 40vh; position: relative; }
#map { height: 100%; width: 100%; z-index: 1; }

#filter-container { background: var(--surface); padding: 10px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; z-index: 999; flex-wrap: wrap; }
.nav-btn, .gps-btn, .dropbtn { background: rgba(255,255,255,0.05); color: white; padding: 10px 15px; font-size: 11px; font-weight: 800; border: 1px solid var(--border); border-radius: 25px; cursor: pointer; }
.nav-btn { background: var(--blue); border: none; }
.gps-btn { background: var(--green); border: none; }

#sidebar { background: var(--surface); flex: 1; overflow-y: auto; padding: 20px; border-top: 2px solid var(--border); z-index: 2; }
@media (min-width: 768px) { #sidebar { width: 400px; flex: none; border-left: 1px solid var(--border); } }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 12px; cursor: pointer; text-align: center; }
.cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); border-width: 2px; }

textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-family: inherit; resize: none; font-size: 14px; }
.btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }
.btn-primary:disabled { opacity: 0.5; cursor: wait; }

.info-box { font-size: 12px; color: #aaa; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid var(--border); line-height: 1.5; }
.report-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid var(--accent); }

/* Ricerca */
.leaflet-control-geocoder { background: #1a1a1a !important; border: 1px solid var(--blue) !important; border-radius: 8px !important; }
.leaflet-control-geocoder-form input { color: white !important; }
.leaflet-control-geocoder-icon { filter: invert(1); }

.custom-pin { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -32px 0 0 -16px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">MAGLIE<span> SENZA BARRIERE</span></div>
  <button onclick="abilitaGestione()" style="background:none; border:none; color:#5a6070;">🔐</button>
</div>

<div id="main">
  <div id="map-wrap">
    <div id="filter-container">
        <select id="filterSelect" class="dropbtn" onchange="applyFilter(this.value)">
            <option value="TUTTE">🔍 TUTTE</option>
            <option value="Architettonica">♿ BARRIERE</option>
            <option value="Occupazione">🚗 AUTO</option>
            <option value="Manutenzione">⚠️ GUASTO</option>
            <option value="Accessibile">✅ OK</option>
        </select>
        <button id="toggleBtn" class="nav-btn" onclick="toggleLocation()">📍 MORIGINO</button>
        <button class="gps-btn" onclick="trovaGPS()">🎯 GPS</button>
    </div>
    <div id="map"></div>
  </div>

  <div id="sidebar">
    <div class="cat-grid">
      <div class="cat-btn active" onclick="setCat(this, 'Architettonica')">♿ Barriera</div>
      <div class="cat-btn" onclick="setCat(this, 'Occupazione')">🚗 Auto</div>
      <div class="cat-btn" onclick="setCat(this, 'Manutenzione')">⚠️ Guasto</div>
      <div class="cat-btn" onclick="setCat(this, 'Accessibile')">✅ Luogo OK</div>
    </div>
    
    <textarea id="desc" rows="3" placeholder="Raccontaci cosa succede..."></textarea>
    <input type="file" id="foto" accept="image/*" style="margin-bottom:15px; width:100%;">
    
    <div style="font-size: 10px; color: #888; text-align: center; margin-bottom: 10px;">⚠️ Privacy: non fotografare volti o targhe.</div>
    <button class="btn-primary" id="btnInvia">INVIA SEGNALAZIONE</button>
    
    <div class="info-box">
        <strong>ASSOCIAZIONE C.F.P.</strong><br>
        Mappatura per l'accessibilità di Maglie e Morigino.
    </div>
    <div id="lista" style="margin-top:20px;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
