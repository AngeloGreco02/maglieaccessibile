<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maglie senza barriere</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        :root { --bg: #0a0c10; --surface: #111318; --border: rgba(255,255,255,.07); --text: #e8eaf0; --accent: #e03535; --blue: #2d7de8; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .logo { font-weight: 800; font-size: 16px; text-transform: uppercase; color: #fff; } .logo span { color: var(--accent); }
        #main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 768px) { #main { flex-direction: row; } }
        #map-wrap { flex: 1; position: relative; display: flex; flex-direction: column; min-height: 45vh; }
        #map { flex: 1; width: 100%; background: #1a1a1a; }
        #controls { background: var(--surface); padding: 8px; display: flex; gap: 5px; z-index: 1000; border-bottom: 1px solid var(--border); }
        .btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--blue); border: none; }
        .btn-green { background: var(--green); border: none; }
        #sidebar { background: var(--surface); width: 100%; padding: 15px; overflow-y: auto; z-index: 1002; border-top: 1px solid var(--border); }
        @media (min-width: 768px) { #sidebar { width: 350px; border-left: 1px solid var(--border); border-top: none; } }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; }
        .cat-btn.active { border-color: var(--accent); background: rgba(224,53,53,0.1); }
        textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; resize: none; }
        .btn-send { width: 100%; background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .report-item { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent); }
        .custom-pin { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -32px 0 0 -16px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
        .pin-icon { transform: rotate(45deg); font-size: 16px; display: block; }
        .leaflet-control-geocoder { background: #1a1a1a !important; border: 1px solid var(--border) !important; border-radius: 8px !important; }
        .leaflet-control-geocoder-form input { color: white !important; background: transparent !important; }
    </style>
</head>
<body>

<div id="topbar">
    <div class="logo">MAGLIE <span>SENZA BARRIERE</span></div>
    <div style="text-align:right">
        <div style="font-size: 8px; color: var(--accent);">ASSOCIAZIONE C.F.P.</div>
        <button onclick="abilitaAdmin()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer;">🔐 ADMIN</button>
    </div>
</div>

<div id="main">
    <div id="map-wrap">
        <div id="controls">
            <select id="filterSelect" class="btn" onchange="window.filtra(this.value)">
                <option value="TUTTE">🔍 TUTTE</option>
                <option value="Barriera">♿ BARRIERE</option>
                <option value="Auto">🚗 AUTO</option>
                <option value="Guasto">⚠️ GUASTI</option>
                <option value="OK">✅ OK</option>
            </select>
            <button class="btn btn-blue" onclick="vaiMorigino()" id="btnMor">📍 MORIGINO</button>
            <button class="btn btn-green" onclick="trovaGPS()">🎯 GPS</button>
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar">
        <div class="cat-grid">
            <div class="cat-btn active" onclick="setCat(this, 'Barriera')">♿ Barriera</div>
            <div class="cat-btn" onclick="setCat(this, 'Auto')">🚗 Auto</div>
            <div class="cat-btn" onclick="setCat(this, 'Guasto')">⚠️ Guasto</div>
            <div class="cat-btn" onclick="setCat(this, 'OK')">✅ Luogo OK</div>
        </div>
        <textarea id="desc" rows="3" placeholder="Descrivi il problema..."></textarea>
        <div style="font-size: 10px; color: var(--blue); font-weight: 700; margin-bottom: 5px;">📸 FOTO:</div>
        <input type="file" id="fotoFile" accept="image/*" style="margin-bottom:15px; font-size:11px;">
        <button class="btn-send" id="btnInvia">INVIA SEGNALAZIONE</button>
        <div id="lista" style="margin-top:20px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBBv6qJW1PdrxLC0s-yjIP96B9SyXORL4",
        authDomain: "maglie-senza-ostacoli.firebaseapp.com",
        databaseURL: "https://maglie-senza-ostacoli-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "maglie-senza-ostacoli"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const imgbb_key = "b0a810118ed11f8c357b1f2befb4972a";

    const map = L.map('map').setView([40.1194, 18.2997], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker;
    let selectedCat = "Barriera";
    let activeFilter = "TUTTE";
    let isAdmin = false;
    let markersLayer = L.layerGroup().addTo(map);
    let rawData = {};

    L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Cerca via..." })
    .on('markgeocode', e => {
        map.setView(e.geocode.center, 18);
        if(marker) map.removeLayer(marker);
        marker = L.marker(e.geocode.center).addTo(map);
    }).addTo(map);

    map.on('click', e => { if(marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); });
    window.trovaGPS = () => map.locate({setView: true, maxZoom: 17});
    map.on('locationfound', e => { if(marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); });

    window.vaiMorigino = () => {
        const btn = document.getElementById('btnMor');
        if(btn.innerText.includes("MORIGINO")) { map.flyTo([40.1417, 18.3098], 17); btn.innerText = "📍 MAGLIE"; }
        else { map.flyTo([40.1194, 18.2997], 15); btn.innerText = "📍 MORIGINO"; }
    };

    window.setCat = (el, cat) => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active'); selectedCat = cat;
    };

    window.abilitaAdmin = () => { if(prompt("Password:") === "maglie2025") { isAdmin = true; renderData(); } };

    window.filtra = (val) => { activeFilter = val; renderData(); };

    onValue(ref(db, 'segnalazioni'), snap => {
        rawData = snap.val() || {};
        renderData();
    });

    function renderData() {
        const lista = document.getElementById('lista');
        lista.innerHTML = ""; markersLayer.clearLayers();
        Object.keys(rawData).reverse().forEach(id => {
            const s = rawData[id];
            if (activeFilter !== "TUTTE" && s.cat !== activeFilter) return;

            const color = s.cat === 'OK' ? '#2ecc71' : (s.cat === 'Auto' ? '#f39c12' : '#e03535');
            const iconChar = s.cat === 'Auto' ? '🚗' : (s.cat === 'Guasto' ? '⚠️' : (s.cat === 'OK' ? '✅' : '♿'));
            
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="custom-pin" style="background:${color}"><span class="pin-icon">${iconChar}</span></div>`,
                iconSize: [32, 42], iconAnchor: [16, 42]
            });

            L.marker([s.lat, s.lng], {icon}).addTo(markersLayer).bindPopup(s.desc);

            const div = document.createElement('div');
            div.className = 'report-item'; div.style.borderLeftColor = color;
            div.innerHTML = `<b>${iconChar} ${s.cat}</b><p style="font-size:11px; margin-top:4px;">${s.desc}</p>
            ${s.fotoUrl ? `<img src="${s.fotoUrl}" style="width:100%; margin-top:8px; border-radius:4px;">` : ''}
            ${isAdmin ? `<br><button onclick="window.elimina('${id}')" style="color:red; font-size:10px; border:none; background:none; cursor:pointer; margin-top:8px;">🗑 ELIMINA</button>` : ''}`;
            lista.appendChild(div);
        });
    }

    window.elimina = id => { if(confirm("Eliminare?")) remove(ref(db, 'segnalazioni/'+id)); };

    document.getElementById('btnInvia').onclick = async () => {
        const d = document.getElementById('desc').value.trim();
        const file = document.getElementById('fotoFile').files[0];
        if(!marker || !d) return alert("Punta sulla mappa e scrivi!");
        const btn = document.getElementById('btnInvia'); btn.disabled = true; btn.innerText = "CARICAMENTO...";
        let url = "";
        if(file) {
            const form = new FormData(); form.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbb_key}`, { method: "POST", body: form });
                const json = await res.json(); url = json.data.url;
            } catch(e) { console.error("Errore foto"); }
        }
        try {
            await push(ref(db, 'segnalazioni'), {
                cat: selectedCat, desc: d, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng, fotoUrl: url, ts: Date.now()
            });
            location.reload();
        } catch(e) { alert("Errore!"); btn.disabled = false; btn.innerText = "INVIA"; }
    };
</script>
</body>
</html>
